  {q:'Kto nie dopełnia obowiązku zawiadomienia Policji o utracie lub zbyciu innej osobie broni i amunicji do tej broni, podlega: (art. 51 ust. 2 uobia)', options:['grzywnie, karze ograniczenia wolności albo pozbawienia wolności do lat 2','wyłącznie karze grzywny','karze aresztu albo grzywny'], correct:2},

  {q:'Kto przechowuje oraz nosi broń i amunicję w sposób umożliwiający dostęp do nich osób nieuprawnionych, podlega: (art. 51 ust. 2 uobia)', options:['grzywnie, karze ograniczenia wolności albo pozbawienia wolności do lat 2','karze aresztu albo grzywny','wyłącznie karze grzywny'], correct:1},
  {q:'Kto używa w celach szkoleniowych lub sportowych broni zdolnej do rażenia celów na odległość poza strzelnicami, podlega: (art. 51 ust. 2 uobia)', options:['karze aresztu albo grzywny','grzywnie, karze ograniczenia wolności albo pozbawienia wolności do lat 2','wyłącznie karze grzywny'], correct:0},

  {q:'Kto posiada broń, nie mając przy sobie legitymacji posiadacza broni lub Europejskiej karty broni palnej albo innego dokumentu upoważniającego do posiadania broni, podlega (art. 51 ust. 3 uobia)', options:['grzywnie, karze ograniczenia wolności albo pozbawienia wolności do lat 2','karze aresztu albo grzywny','wyłącznie karze grzywny'], correct:2},

  {q:'Kto nieumyślnie powoduje utratę broni palnej lub amunicji, która zgodnie z prawem pozostaje w jego dyspozycji, podlega: (art. 263 kodeksu karnego)', options:['wyłącznie karze aresztu albo grzywny','grzywnie, karze ograniczenia wolności albo pozbawienia wolności do roku','grzywnie'], correct:1},

let activeQuestions=[], current=0, score=0, answered=false, examMode=false, timer, timeLeft=1800;

function shuffle(array){return array.sort(()=>Math.random()-0.5);}

function startFullTest(){
  examMode=false;
  activeQuestions=shuffle([...questions]);
  current=0;
  score=0;
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('progress-container').style.display='block';
  document.getElementById('timer').classList.add('hidden');
  document.getElementById('finishBackBtn').classList.remove('hidden');
  renderQuestion();
}

function startExam(){
  examMode=true;
  activeQuestions=shuffle([...questions]).slice(0,20);
  current=0;
  score=0;
  timeLeft=1800;
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('progress-container').style.display='block';
  document.getElementById('timer').classList.remove('hidden');
  document.getElementById('finishBackBtn').classList.remove('hidden');
  startTimer();
  renderQuestion();
}

function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    let min=Math.floor(timeLeft/60);
    let sec=timeLeft%60;
    document.getElementById('timer').textContent=`Czas: ${min}:${sec<10?'0':''}${sec}`;
    if(timeLeft<=0){clearInterval(timer); finishQuiz();}
  },1000);
}

function renderQuestion(){
  answered=false;
  let q=activeQuestions[current];
  let optionOrder=q.options.map((t,i)=>({text:t,index:i}));
  optionOrder=shuffle(optionOrder);

  document.getElementById('question').textContent=q.q;
  document.getElementById('feedback').textContent='';
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('answers').innerHTML='';

  optionOrder.forEach(opt=>{
    let btn=document.createElement('button');
    btn.className='option';
    btn.textContent=opt.text;
    btn.onclick=()=>checkAnswer(opt.index, btn);
    document.getElementById('answers').appendChild(btn);
  });

  let progressPercent=((current + 1)/activeQuestions.length)*100;
  document.getElementById('progress').style.width=`${progressPercent}%`;
  document.getElementById('score').textContent=`Punkty: ${score}`;
  document.getElementById('counter').textContent=`Pytanie ${current+1}/${activeQuestions.length}`;
}

function checkAnswer(selectedIndex){
  if(answered) return;
  answered=true;
  let q=activeQuestions[current];
  let buttons=document.querySelectorAll('.option');
  buttons.forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.options[q.correct]){
      b.style.backgroundColor='lightgreen';
    }
  });

  buttons.forEach(b=>{
    if(b.textContent===q.options[selectedIndex]){
      b.style.border='3px solid black';
      if(selectedIndex !== q.correct){
        b.style.backgroundColor='lightcoral';
      }
    }
  });

  if(selectedIndex===q.correct){
    score++;
    document.getElementById('feedback').textContent='✅ Poprawna odpowiedź';
    document.getElementById('feedback').className='feedback ok';
  }else{
    document.getElementById('feedback').textContent='❌ Błędna odpowiedź';
    document.getElementById('feedback').className='feedback bad';
  }
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion(){
  current++;
  if(current>=activeQuestions.length){finishQuiz(); return;}
  renderQuestion();
}

function finishQuiz(){
  clearInterval(timer);
  document.getElementById('question').textContent='Wynik testu:';
  if(examMode){
    let result=score>=18?`✅ Zdane (${score}/${activeQuestions.length})`:`❌ Niezdane (${score}/${activeQuestions.length})`;
    document.getElementById('feedback').textContent=result;
    document.getElementById('feedback').className='feedback ' + (score>=18 ? 'ok' : 'bad');
  }else{
    document.getElementById('feedback').textContent=`${score}/${activeQuestions.length}`;
    document.getElementById('feedback').className='feedback';
  }
  document.getElementById('answers').innerHTML='';
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('finishBackBtn').classList.remove('hidden');
}

function backToMenu(){
  document.getElementById('menu').classList.remove('hidden');
  document.getElementById('progress-container').style.display='none';
  document.getElementById('timer').classList.add('hidden');
  document.getElementById('question').textContent='';
  document.getElementById('answers').innerHTML='';
  document.getElementById('feedback').textContent='';
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('finishBackBtn').classList.add('hidden');
  current=0; score=0; clearInterval(timer);
}

</script>
